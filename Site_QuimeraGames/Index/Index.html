<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuimeraGames</title>
  <link rel="stylesheet" href="stylle.css">
</head>

<body>

  <div class="container">

    <!-- TOPO -->
    <header class="topo">
      <img class="logo" src="https://picsum.photos/800/400">
      <button>Home</button>

      <div class="topo-direita">
        <button>Entrar</button>
        <button>Suporte</button>
      </div>
    </header>


    <div class="menu">
      <button>🔍 Pesquisar loja</button>
      <button>Explorar</button>
      <button>Categorias</button>
    </div>


    <div class="carousel">

      <input type="radio" name="slide" id="s1" checked>
      <input type="radio" name="slide" id="s2">
      <input type="radio" name="slide" id="s3">

      <div class="slides">

        <div class="slide">
          <img class="main" src="../imagens/cyber.jpg">
          <div class="side">
            <img src="../imagens/cyberpunk.jpg">
            <img src="../imagens/cyberpunk1.jpg">
          </div>
        </div>

        <div class="slide">
          <img class="main" src="../imagens/cyber.jpg">
          <div class="side">
            <img src="../imagens/cyberpunk.jpg">
            <img src="../imagens/cyberpunk1.jpg">
          </div>
        </div>

        <div class="slide">
          <img class="main" src="../imagens/cyber.jpg">
          <div class="side">
            <img src="../imagens/cyberpunk.jpg">
            <img src="../imagens/cyberpunk1.jpg">
          </div>
        </div>

      </div>

      <div class="dots">
        <label for="s1"></label>
        <label for="s2"></label>
        <label for="s3"></label>
      </div>

    </div>


    <section class="secao">
      <h2>Descontos em destaque ></h2>
      <div class="jogos">
        <img src="../imagens/cyber.jpg">
        <img src="../imagens/cyber.jpg">
        <img src="../imagens/cyber.jpg">
        <img src="../imagens/cyber.jpg">
        <img src="../imagens/cyber.jpg">
      </div>
    </section>

    <section class="secao">
      <h2>Descubra algo novo ></h2>
      <div class="jogos">
        <img src="../imagens/cyber.jpg">
        <img src="../imagens/cyber.jpg">
        <img src="../imagens/cyber.jpg">
        <img src="../imagens/cyber.jpg">
        <img src="../imagens/cyber.jpg">
      </div>
    </section>

  </div>

  <footer class="rodape">
    Rodapé
  </footer>

</body>

</html>
