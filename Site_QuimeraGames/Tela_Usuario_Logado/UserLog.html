<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuimeraGames</title>
    <link rel="stylesheet" href="UserLog.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header class="topo">

        <img class="img" src="../imagens/logoproj_quimera.png " alt="🍹">

        <button id="home">
            <i class="fas fa-home"></i>
        </button>

        <section>
            <button id="Carrinho_compras">
                <i class="fa-solid fa-cart-shopping"></i>
            </button>

            <button id="suporte">Suporte</button>
        </section>

    </header>

    <section class="butaosprincipais">
        <button id="pesquisarLoja">Pesquisar loja</button>
        <button id="pesquisarLoja">Explorar</button>
        <button id="pesquisarLoja">Categorias</button>
    </section>


    <div class="carousel">

        <!--passadores-->
        <input type="radio" name="slide" id="s1" checked>
        <input type="radio" name="slide" id="s2">
        <input type="radio" name="slide" id="s3">
        <input type="radio" name="slide" id="s4">
        <input type="radio" name="slide" id="s5">
        <input type="radio" name="slide" id="s6">
        <input type="radio" name="slide" id="s7">


        <!--imagens-->
        <div class="slides">


            <!--imagem1-->
            <div class="slide">
                <img class="main" src="../imagens/cyber.jpg">
                <div class="side">
                    <img src="../imagens/cyberpunk.jpg">
                    <img src="../imagens/cyberpunk1.jpg">
                </div>
            </div>

            <!--imagem2-->
            <div class="slide">
                <img class="main" src="">
                <div class="side">
                    <img src="">
                    <img src="">
                </div>
            </div>

            <!--imagem3-->
            <div class="slide">
                <img class="main" src="">
                <div class="side">
                    <img src="">
                    <img src="">
                </div>
            </div>

            <!--imagem4-->
            <div class="slide">
                <img class="main" src="">
                <div class="side">
                    <img src="">
                    <img src="">
                </div>
            </div>

            <!--imagem5-->
            <div class="slide">
                <img class="main" src="">
                <div class="side">
                    <img src="">
                    <img src="">
                </div>
            </div>

            <!--imagem6-->
            <div class="slide">
                <img class="main" src="">
                <div class="side">
                    <img src="">
                    <img src="">
                </div>
            </div>

            <!--imagem7-->
            <div class="slide">
                <img class="main" src="">
                <div class="side">
                    <img src="">
                    <img src="">
                </div>
            </div>

        </div>

        <!-- Bolinhas -->
        <div class="dots">
            <label for="s1"></label>
            <label for="s2"></label>
            <label for="s3"></label>
            <label for="s4"></label>
            <label for="s5"></label>
            <label for="s6"></label>
            <label for="s7"></label>
        </div>

    </div>
    <section class="destaques">
        <h2>Descontos em destaque ></h2>

        <div class="jogos">
            <img src="../imagens/cyber.jpg">
            <img src="../imagens/cyber.jpg">
            <img src="../imagens/cyber.jpg">
            <img src="../imagens/cyber.jpg">
            <img src="../imagens/cyber.jpg">
        </div>
    </section>

    <footer class="rodape">
        
            <div class="primeira_cadastre">
                <label class="primeira">Primeira vez na Quimera?</label>
                <button class="cad">Cadastre-se</button>
            </div>

            <div class="texto">
                <p>É gratuito e fácil. Descubra milhares de jogos
                    para jogar com milhões de novos amigos.</p>
            </div>
        </div>
    </footer>
</body>



</html>
